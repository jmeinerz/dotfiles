window:
  decorations: full
  startup_mode: Fullscreen

font:
  normal:
    family: "Menlo"
  bold:
    familiy: "Menlo"
  italic:
    family: "Menlo"
  size: 14.0
  use_thin_strokes: true

# Colors (Solarized Dark)
colors:
  # Default colors
  primary:
    background: '#002b36' # base03
    foreground: '#cccccc' # base0

  # Cursor colors
  cursor:
    text:   '#002b36' # base03
    cursor: '#839496' # base0

  # Normal colors
  normal:
    black:   '#073642' # base02
    red:     '#e04643' # red
    green:   '#2dc722' # green
    yellow:  '#b58900' # yellow
    blue:    '#268bd2' # blue
    magenta: '#d33682' # magenta
    cyan:    '#2aa198' # cyan
    white:   '#eee8d5' # base2

  # Bright colors
  bright:
    black:   '#586e75' # base01
    red:     '#cb4b16' # orange
    green:   '#586e75' # base01
    yellow:  '#657b83' # base00
    blue:    '#839496' # base0
    magenta: '#6c71c4' # violet
    cyan:    '#93a1a1' # base1
    white:   '#fdf6e3' # base3

key_bindings:
  - { key: Left, mods: Option, chars: "\x1bb" }
  - { key: Right, mods: Option, chars: "\x1bf" }
